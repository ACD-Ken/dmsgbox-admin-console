<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - DMsgBox Admin Console</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="navbar-brand">
                <h1>DMsgBox Admin Console</h1>
                <span class="subtitle">Device Management System</span>
            </div>
        </nav>

        <!-- Reset Password Panel -->
        <div id="resetPanel" class="panel panel-primary" style="max-width: 500px; margin: 100px auto;">
            <div class="panel-content">
                <h2>Reset Password</h2>
                <p class="text-muted">Enter your new password below</p>
                
                <form id="resetForm">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" required placeholder="••••••••" class="form-control">
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" required placeholder="••••••••" class="form-control">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
                </form>

                <div id="resetError" class="alert alert-danger" style="display:none;"></div>
                <div id="resetSuccess" class="alert alert-success" style="display:none;">
                    <p>Password reset successfully! <a href="index.html">Go to login</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.0.0/dist/main.umd.js"></script>
    
    <script>
        const SUPABASE_URL = 'https://bjpwckpmktnwtdzpmnvn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqcHdja3Bta3Rud3RkenBtbnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMDc1NTAsImV4cCI6MjA5MjU4MzU1MH0.BMHQDBEANQdZhm4_62Jh9sewdZnAxOZzvKcZCPUoDd0';

        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const resetForm = document.getElementById('resetForm');
        const resetError = document.getElementById('resetError');
        const resetSuccess = document.getElementById('resetSuccess');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            // Validate password strength
            if (newPassword.length < 8) {
                showError('Password must be at least 8 characters long');
                return;
            }

            try {
                // Get the recovery token from URL
                const hash = window.location.hash.substring(1);
                const params = new URLSearchParams(hash);
                
                if (!params.has('access_token') || !params.has('refresh_token')) {
                    showError('Invalid or expired password reset link. Please try again.');
                    return;
                }

                // Set the session with tokens
                const { error: sessionError } = await supabase.auth.setSession({
                    access_token: params.get('access_token'),
                    refresh_token: params.get('refresh_token')
                });

                if (sessionError) {
                    showError('Session expired. Please request a new password reset link.');
                    return;
                }

                // Update password
                const { error: updateError } = await supabase.auth.updateUser({
                    password: newPassword
                });

                if (updateError) {
                    showError(updateError.message || 'Failed to reset password');
                    return;
                }

                // Success!
                resetForm.style.display = 'none';
                resetError.style.display = 'none';
                resetSuccess.style.display = 'block';

                // Redirect to login after 3 seconds
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);

            } catch (error) {
                showError(error.message || 'An error occurred');
            }
        });

        function showError(message) {
            resetError.textContent = message;
            resetError.style.display = 'block';
            resetSuccess.style.display = 'none';
        }
    </script>
</body>
</html>
